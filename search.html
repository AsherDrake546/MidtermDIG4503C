<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KinoRate Movie Search</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="search">
  <div id="app-shell" hidden>
    <nav>
      <a href="index.html" class="nav-logo">Kino<span>Rate</span></a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="search.html">Movie Search</a></li>
        <li id="nav-user" class="nav-user"></li>
        <li><button id="logout-button" type="button" class="btn btn-outline btn-sm">Logout</button></li>
      </ul>
    </nav>

    <main class="search-results-page">
      <section class="search-card">
        <div class="search-header">
          <h1>Movie Search Results</h1>
          <p>Search TMDB for movie details to start planning reviews.</p>
        </div>

        <form id="movie-search-form" class="search-form" autocomplete="off">
          <label for="movie-query">Search for a movie</label>
          <div class="search-row search-row-main index-search-input-wrap">
            <input id="movie-query" name="query" type="text" placeholder="e.g. Interstellar" aria-autocomplete="list" aria-expanded="false" aria-controls="search-suggestion-list" />
            <button type="submit" class="auth-btn">🔍 Search</button>
            <ul id="search-suggestion-list" class="suggestion-list" role="listbox" aria-label="Movie suggestions"></ul>
          </div>
        </form>

        <p id="tmdb-status" class="tmdb-status info">Enter a movie title to search.</p>
      </section>

      <section id="search-results" class="results-grid" aria-live="polite"></section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/search.js"></script>
</body>
</html>
