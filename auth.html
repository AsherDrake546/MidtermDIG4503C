<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KinoRate Auth</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="auth">
  <main class="auth-page">
    <section class="auth-card">
      <h1>KinoRate Authentication</h1>
      <p class="auth-subtitle">Create your account or log in to continue.</p>
      <p id="auth-message" class="auth-message" aria-live="polite"></p>

      <div class="auth-grid">
        <section class="auth-section">
          <h2>Sign Up</h2>
          <form id="signup-form">
            <label for="signup-email">Email</label>
            <input id="signup-email" name="email" type="email" required />

            <label for="signup-password">Password</label>
            <input id="signup-password" name="password" type="password" required minlength="6" />

            <button type="submit" class="auth-btn">Create Account</button>
          </form>
        </section>

        <section class="auth-section">
          <h2>Login</h2>
          <form id="login-form">
            <label for="login-email">Email</label>
            <input id="login-email" name="email" type="email" required />

            <label for="login-password">Password</label>
            <input id="login-password" name="password" type="password" required minlength="6" />

            <button type="submit" class="auth-btn">Login</button>
          </form>
        </section>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
