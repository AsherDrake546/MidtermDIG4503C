<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KinoRate Watch List</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="watchlist">
  <div id="app-shell" hidden>
    <nav>
      <a href="index.html" class="nav-logo">Kino<span>Rate</span></a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="search.html">Movie Search</a></li>
        <li id="nav-user" class="nav-user"></li>
        <li><button id="logout-button" type="button" class="btn btn-outline btn-sm">Logout</button></li>
      </ul>
    </nav>

    <main class="watchlist-page">
      <p id="watchlist-page-status" class="tmdb-status info">Loading watch list...</p>

      <section id="watchlist-detail-card" class="watchlist-detail-card" aria-live="polite"></section>
      <section class="watchlist-items-section">
        <div id="watchlist-items-rail" class="watchlist-items-rail" aria-live="polite"></div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/watchlist.js"></script>
</body>
</html>
