<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KinoRate User</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="user">
  <div id="app-shell" hidden>
    <nav>
      <a href="index.html" class="nav-logo">Kino<span>Rate</span></a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="search.html">Movie Search</a></li>
        <li id="nav-user" class="nav-user"></li>
        <li><button id="logout-button" type="button" class="btn btn-outline btn-sm">Logout</button></li>
      </ul>
    </nav>

    <main class="user-page">
      <p id="user-page-status" class="tmdb-status info">Loading user profile...</p>

      <section class="user-profile-card" id="user-profile-card" aria-live="polite"></section>

      <section class="user-top-five" id="user-top-five">
        <div class="section-header">
          <h2>Top <span>Five Movies</span></h2>
          <p>Favorite films from this user.</p>
        </div>
        <div id="user-favorites-grid" class="user-favorites-grid" aria-live="polite"></div>
      </section>

      <section class="user-watchlists-section" id="user-watchlists-section">
        <div class="section-header">
          <h2>Watch <span>Lists</span></h2>
          <p>Movie lists created by this user.</p>
        </div>
        <div id="user-watchlists-grid" class="user-watchlists-grid" aria-live="polite"></div>
      </section>

      <section class="user-reviews-section" id="user-reviews-section">
        <div class="section-header">
          <h2>User <span>Reviews</span></h2>
          <p>All reviews written by this user.</p>
        </div>
        <div id="user-reviews-list" class="reviews-list" aria-live="polite"></div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/user.js"></script>
</body>
</html>
